version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    # Angular escribe a dist/polla-app/browser (output mode 'browser' por default en
    # Angular 17+). Si en el futuro cambia el output path, ajustar acá.
    baseDirectory: dist/polla-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
