version: 1
frontend:
  phases:
    preBuild:
      commands:
        # app.config.ts importa desde '../amplify_outputs.json' (resuelve a
        # src/amplify_outputs.json). Tenemos el archivo committeado en raíz;
        # acá lo copiamos a src/ antes del build para que el import resuelva.
        - cp amplify_outputs.json src/amplify_outputs.json
        # NOTE: npm install (not npm ci) because @aws-amplify/backend pulls deps
        # with zod peer-dep ERESOLVE conflicts that prevent npm ci from working
        # cleanly. .npmrc has legacy-peer-deps=true to make resolution consistent.
        # 5 previous "refresh lockfile" commits were band-aids; this is the real fix.
        - npm install --no-audit --no-fund --prefer-offline --cache .npm
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/polla-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
