version: 1
frontend:
  phases:
    preBuild:
      commands:
        # app.config.ts importa desde '../amplify_outputs.json' (resuelve a
        # src/amplify_outputs.json). Tenemos el archivo committeado en raíz;
        # acá lo copiamos a src/ antes del build para que el import resuelva.
        - cp amplify_outputs.json src/amplify_outputs.json
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/polla-app/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
